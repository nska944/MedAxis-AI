name: Deploy — Backend (Render) + Frontend (Vercel)

on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: Trigger a Render deploy hook for the backend
  # ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          response=$(curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $response"

  # ──────────────────────────────────────────────────────
  # JOB 2: Deploy frontend to Vercel (unchanged)
  # ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        working-directory: ./frontend
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
